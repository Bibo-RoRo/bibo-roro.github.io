<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controller</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #15202a;
}

#text {
  flex: 1;
  padding: 20px;
  font-size: 18px;
  outline: none;
}

.buttons {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 60px;
}

button {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  border: none;
  font-size: 30px;
  background: rgba(255,255,255,0.1);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div id="text" contenteditable="true">

</div>

<div class="buttons">
  <button onclick="changeStatus(-1)">⬅️</button>
  <button onclick="changeStatus(1)">➡️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://euuptkidjsquvhohvicv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1dXB0a2lkanNxdXZob2h2aWN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUwMDk4OTksImV4cCI6MjA3MDU4NTg5OX0.O1isV0Ove_Tb1ruXqY_dlD4UdQGM174eVw9Kp_22YO4";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentStatus = 0;

// Status laden
async function loadStatus() {
  let { data } = await client.from("insta").select("*").eq("id", 1).single();
  currentStatus = data.status;
}
loadStatus();

// Status ändern
async function changeStatus(delta) {
  currentStatus += delta;
  if (currentStatus < 0) currentStatus = 0;

  await client
    .from("insta")
    .update({ status: currentStatus })
    .eq("id", 1);
}
</script>

</body>
</html>
