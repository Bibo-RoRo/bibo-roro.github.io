<script>
function normalizeISBN(isbn) {
    return isbn.replace(/-/g, "").trim();
}

// ISBN-10 → ISBN-13
function isbn10to13(isbn10) {
    if (!isbn10 || isbn10.length !== 10) return null;

    const core = "978" + isbn10.substring(0, 9);

    let sum = 0;
    for (let i = 0; i < core.length; i++) {
        const digit = parseInt(core[i]);
        sum += (i % 2 === 0) ? digit : digit * 3;
    }

    const check = (10 - (sum % 10)) % 10;
    return core + check;
}

// ISBN-13 → ISBN-10 (nur wenn Prefix 978 möglich)
function isbn13to10(isbn13) {
    if (!isbn13 || isbn13.length !== 13 || !isbn13.startsWith("978")) return null;

    const core = isbn13.substring(3, 12);

    let sum = 0;
    for (let i = 0; i < core.length; i++) {
        sum += parseInt(core[i]) * (10 - i);
    }

    const remainder = sum % 11;
    const check = (11 - remainder) % 11;

    return core + (check === 10 ? "X" : check.toString());
}

function possibleISBNVariants(isbnInput) {
    const normalized = normalizeISBN(isbnInput);
    if (!normalized) return [];

    const variants = new Set();
    variants.add(normalized);

    if (normalized.length === 10) {
        const isbn13 = isbn10to13(normalized);
        if (isbn13) variants.add(isbn13);
    }

    if (normalized.length === 13) {
        const isbn10 = isbn13to10(normalized);
        if (isbn10) variants.add(isbn10);
    }

    return Array.from(variants);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://euuptkidjsquvhohvicv.supabase.co";
const SUPABASE_KEY = "ds";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let medien = [];
let auswahl = [];

/* ---------------- OPENLIBRARY CACHE ---------------- */

const openLibraryCache = new Map();

/* ---------------- OPENLIBRARY LOOKUP ---------------- */

async function getOpenLibraryLink(isbn, titel = "", autor = "") {

    const variants = isbn ? possibleISBNVariants(isbn) : [];

    // Bereits im Cache?
    for (const v of variants) {
        if (openLibraryCache.has(v)) {
            return openLibraryCache.get(v);
        }
    }

    /* ---------------- ISBN LOOKUP ---------------- */

    for (const v of variants) {
        try {
            const res = await fetch(`https://openlibrary.org/isbn/${v}.json`);

            if (!res.ok) continue;

            const data = await res.json();

            if (data.key) {

                const url = `https://openlibrary.org${data.key}`;

                for (const vv of variants) {
                    openLibraryCache.set(vv, url);
                }

                return url;
            }

        } catch (err) {
            console.warn("OpenLibrary ISBN Lookup fehlgeschlagen:", err);
        }
    }

    /* ---------------- FALLBACK: TITLE + AUTHOR SEARCH ---------------- */

    try {

        const queryParts = [];

        if (titel) queryParts.push(titel);
        if (autor) queryParts.push(autor);

        if (queryParts.length > 0) {

            const query = encodeURIComponent(queryParts.join(" "));

            const res = await fetch(
                `https://openlibrary.org/search.json?q=${query}&limit=1`
            );

            if (res.ok) {

                const data = await res.json();

                if (data.docs && data.docs.length > 0) {

                    const doc = data.docs[0];

                    let url = null;

                    // bevorzugt works-Seite
                    if (doc.key) {
                        url = `https://openlibrary.org${doc.key}`;
                    }

                    // fallback edition_key
                    else if (doc.edition_key && doc.edition_key.length > 0) {
                        url = `https://openlibrary.org/books/${doc.edition_key[0]}`;
                    }

                    if (url) {

                        for (const vv of variants) {
                            openLibraryCache.set(vv, url);
                        }

                        return url;
                    }
                }
            }
        }

    } catch (err) {
        console.warn("OpenLibrary Search Fallback fehlgeschlagen:", err);
    }

    // Negativ cachen
    for (const vv of variants) {
        openLibraryCache.set(vv, null);
    }

    return null;
}

async function ladeMedien() {
    const { data } = client.storage.from("medien").getPublicUrl("medien.json?=" + new Date());
    const res = await fetch(data.publicUrl);
    medien = await res.json();
    await ladeAuswahl();
    setupSearch();
}

async function ladeAuswahl() {
    const { data } = client.storage.from("medien").getPublicUrl("auswahl.json");
    const res = await fetch(data.publicUrl);
    auswahl = await res.json();
    renderListe(auswahl, document.getElementById("book-list"));
}

/* ---------------- COVER LOGIK ---------------- */

function getLocalCover(num) {
    return `b/cover/${num}.jpg`;
}

function getOpenLibraryCover(isbn, size = "L") {
    return `https://covers.openlibrary.org/b/isbn/${isbn}-${size}.jpg`;
}

function getFallbackCover() {
    return "b/thumbnail.png";
}

/* ---------------- LAZY LOADING ---------------- */

const coverObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
        if (!entry.isIntersecting) continue;

        const img = entry.target;
        coverObserver.unobserve(img);

        const nummer = img.dataset.nummer;
        const isbn = img.dataset.isbn;

        loadCover(img, nummer, isbn);
    }
}, { rootMargin: "150px" });

const isMobile = window.matchMedia("(max-width: 768px)").matches;

function loadCover(img, nummer, isbn, allowMobile = false) {
    if (isMobile && !allowMobile) return;

    if (nummer) {
        img.src = getLocalCover(nummer);
        img.onerror = () => tryOpenLibrary(img, isbn);
        return;
    }

    tryOpenLibrary(img, isbn);
}

function tryOpenLibrary(img, isbn) {

    if (!isbn) {
        img.src = getFallbackCover();
        return;
    }

    let step = 0;

    function loadNext() {

        step++;

        if (step === 1) {
            img.src = getOpenLibraryCover(isbn, "L");
        }

        else if (step === 2) {
            img.src = getOpenLibraryCover(isbn, "M");
        }

        else {
            img.src = getFallbackCover();
        }
    }

    img.onload = () => {

        // Dummybilder erkennen
        if (img.naturalWidth < 10) {
            loadNext();
        }
    };

    img.onerror = loadNext;

    loadNext();
}

/* ---------------- LISTE ---------------- */

function renderListe(liste, container) {

    container.innerHTML = "";

    for (const b of liste) {

        const div = document.createElement("div");
        div.className = "book";

        const img = document.createElement("img");

        img.className = "book-cover";
        img.alt = b.Titel || "Cover";

        img.dataset.nummer = b.Nummer || "";
        img.dataset.isbn = normalizeISBN(b.ISBN || b.isbn || "");

        img.src = "b/thumbnail.png";

        coverObserver.observe(img);

        const signaturRaw = b.Signatur || "-";

        let signaturAnzeige = signaturRaw;

        if (signaturAnzeige.toLowerCase().includes("ohne sign")) {
            signaturAnzeige = "[...]";
        }

        if (signaturAnzeige.length > 25) {
            signaturAnzeige = signaturAnzeige.slice(0, 22) + "...";
        }

        const info = document.createElement("div");

        info.innerHTML = `
            <div class="book-header">
                <div>
                    <div class="book-title">
                        <span>${b.Titel || "Ohne Titel"}</span>
                        <span>${b.Untertitel ? ` ...${b.Untertitel}` : ""}</span>
                    </div>

                    <div class="book-author">
                        ${b.Autor || "Unbekannter Autor"}
                    </div>
                </div>

                <div class="book-signature">
                    ${signaturAnzeige}
                </div>
            </div>

            <div class="book-meta">
                MeNummer: ${b.Nummer || "-"} &nbsp;|&nbsp;
                ISBN: ${(b.ISBN || b.isbn || "-")}
            </div>
        `;

        div.appendChild(img);
        div.appendChild(info);

        div.addEventListener("click", () => zeigeLightbox(b, img));

        container.appendChild(div);
    }
}

/* ---------------- LIGHTBOX ---------------- */

async function zeigeLightbox(buch, originalImg = null) {

    const overlay = document.getElementById("lightbox-overlay");
    const content = document.getElementById("lightbox-content");

    const nummer = buch.Nummer;
    const isbn = normalizeISBN(buch.ISBN || buch.isbn || "");

    content.innerHTML = "";

    let img;

    // Bild übernehmen
    if (originalImg) {

        img = originalImg.cloneNode();

        if (isMobile) {
            loadCover(img, nummer, isbn, true);
        }

    } else {

        img = document.createElement("img");

        img.className = "search-cover";

        img.dataset.nummer = nummer || "";
        img.dataset.isbn = isbn || "";

        img.src = getFallbackCover();

        loadCover(img, nummer, isbn, true);
    }

    img.classList.add("search-cover");

    content.appendChild(img);

    /* ---------------- INFOS ---------------- */

    const info = document.createElement("div");

    info.className = "book-info";

    info.innerHTML = `
        <div>Titel:</div><div>${buch.Titel || "-"}</div>
        <div>Untertitel:</div><div>${buch.Untertitel || "-"}</div>
        <div>Autor:</div><div>${buch.Autor || "-"}</div>
        <div>Signatur:</div><div>${buch.Signatur || "-"}</div>
        <div>ISBN:</div><div>${buch.ISBN || "-"}</div>
        <div>Nummer:</div><div>${buch.Nummer || "-"}</div>
        <div>Informationen:</div><div id="openlibrary-info">Suche läuft...</div>
    `;

    content.appendChild(info);

    overlay.style.display = "flex";

    /* ---------------- OPENLIBRARY LINK ---------------- */

    const openLibraryDiv = info.querySelector("#openlibrary-info");

    const openLibraryUrl = await getOpenLibraryLink(
        isbn,
        buch.Titel || "",
        buch.Autor || ""
    );

    if (openLibraryUrl) {

        openLibraryDiv.innerHTML = `
            <a href="${openLibraryUrl}" target="_blank" rel="noopener noreferrer">Open Library</a>
        `;

    } else {

        openLibraryDiv.innerHTML = `-`;
    }
}

document.getElementById("lightbox-overlay").addEventListener("click", (e) => {

    if (e.target.id === "lightbox-overlay") {
        e.target.style.display = "none";
    }
});

/* ---------------- SEARCH ---------------- */

function setupSearch() {

    const searchInput = document.getElementById("search");
    const isbnInput = document.getElementById("isbn-search");

    const container = document.getElementById("book-list");
    const info = document.getElementById("auswahl-info");

    function run() {

        const q = searchInput.value.toLowerCase().trim();
        const isbnQ = isbnInput.value.trim();

        if (!q && !isbnQ) {

            info.style.display = "block";

            renderListe(auswahl, container);

            return;
        }

        info.style.display = "none";

        let result = medien;

        if (isbnQ) {

            const norm = normalizeISBN(isbnQ);

            result = result.filter(b =>
                normalizeISBN(b.ISBN || b.isbn) === norm
            );

        } else {

            const qNorm = q.toLowerCase();

            result = result.filter(b =>
                (b.Titel || "").toLowerCase().includes(q) ||
                (b.Autor || "").toLowerCase().includes(q)
            );

            result.sort((a, b) => {

                const titleA = (a.Titel || "").toLowerCase();
                const titleB = (b.Titel || "").toLowerCase();

                const exactA = titleA === qNorm;
                const exactB = titleB === qNorm;

                if (exactA && !exactB) return -1;
                if (!exactA && exactB) return 1;

                return 0;
            });
        }

        // Double-Filterung
        const seen = new Set();

        result = result.filter(b => {

            const isbn = normalizeISBN(b.ISBN || b.isbn || "");

            if (!isbn) return true;

            if (seen.has(isbn)) return false;

            seen.add(isbn);

            return true;
        });

        renderListe(result, container);
    }

    searchInput.addEventListener("keypress", e => e.key === "Enter" && run());
    isbnInput.addEventListener("keypress", e => e.key === "Enter" && run());
}

/* ---------------- START ---------------- */

ladeMedien();
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const triggers = document.querySelectorAll('.toggleTrigger');

    triggers.forEach(trigger => {
        const menu = trigger.nextElementSibling;
        const png = trigger.querySelector('.toggle-png');

        const getDefaultOpen = () => {
            const attr = trigger.getAttribute('data-default-open');
            return attr === 'true';
        };

        const getDisplayType = () => {
            return trigger.getAttribute('data-display') || 'block';
        };

        const setInitialState = () => {
            const defaultOpen = getDefaultOpen();
            const displayType = getDisplayType();
            menu.style.display = defaultOpen ? displayType : 'none';
            menu.dataset.expanded = defaultOpen.toString();
        };

        trigger.addEventListener('click', () => {
            const isExpanded = menu.dataset.expanded === 'true';
            const displayType = getDisplayType();
            menu.style.display = isExpanded ? 'none' : displayType;
            menu.dataset.expanded = (!isExpanded).toString();

            if (png) {
                png.src = !isExpanded ? '../b/toggle-down.png' : '../b/toggle-up.png';
            }
        });

        setInitialState();
    });
});
</script>
